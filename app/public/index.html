<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Container Lifecycle Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        line-height: 1.5;
      }
      body {
        max-width: 42rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      pre {
        background: color-mix(in srgb, Canvas 92%, CanvasText 8%);
        padding: 1rem;
        overflow: auto;
        border-radius: 8px;
        font-size: 0.85rem;
      }
      a {
        color: inherit;
      }
      .muted {
        opacity: 0.75;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Container lifecycle demo</h1>
    <p class="muted">
      Small Node service used to exercise build, scan, deploy, and runtime checks. Use the JSON API
      for automation; this page is for quick manual checks in a browser.
    </p>
    <p>
      <a href="/health">/health</a> ·
      <a href="/readiness">/readiness</a> ·
      <a href="/lifecycle">/lifecycle</a> ·
      <a href="/">/</a> (JSON root)
    </p>
    <h2>Sample response</h2>
    <pre id="out">Loading…</pre>
    <script>
      fetch('/', { headers: { Accept: 'application/json' } })
        .then((r) => r.json())
        .then((data) => {
          document.getElementById('out').textContent = JSON.stringify(data, null, 2);
        })
        .catch((e) => {
          document.getElementById('out').textContent = String(e);
        });
    </script>
  </body>
</html>
